<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="b"><circle cx="50" cy="50" r="30"/></clipPath>
  </defs>
  <!-- Rounded square background matching .app-logo-mark -->
  <rect width="100" height="100" rx="18" fill="#059669"/>
  <!-- White ball -->
  <circle cx="50" cy="50" r="30" fill="white"/>
  <!-- Soccer ball pentagon pattern, clipped to ball -->
  <g clip-path="url(#b)" fill="#1a1a1a">
    <!-- Center pentagon: r=13, vertices at screen angles 0°,72°,144°,216°,288° from top -->
    <polygon points="50,37 62,46 58,61 42,61 38,46"/>
    <!-- Outer patch: upper-right (tip at 36°) -->
    <polygon points="56,33 65,39 74,32 68,25 59,22"/>
    <!-- Outer patch: right (tip at 108°) -->
    <polygon points="68,50 65,61 74,68 80,60 80,50"/>
    <!-- Outer patch: bottom (tip at 180°) -->
    <polygon points="55,67 45,67 40,78 50,81 60,78"/>
    <!-- Outer patch: left (tip at 252°) -->
    <polygon points="32,50 35,61 26,68 20,60 20,50"/>
    <!-- Outer patch: upper-left (tip at 324°) -->
    <polygon points="44,33 35,39 26,32 32,25 41,22"/>
  </g>
</svg>
